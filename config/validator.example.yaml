network:
  name: platform
  netuid: 100
  chain_endpoint: null
  wallet_name: default
  wallet_hotkey: default
  wallet_path: null
  master_uid: 0

# If the validator infrastructure requirements are too high, operators can use
# Bittensor CHK / stake weight check to give validation power to the recommended
# Platform validator hotkey instead of running this validator stack themselves:
# 5GziQCcRpN8NCJktX343brnfuVe3w6gUYieeStXPD1Dag2At

validator:
  registry_url: https://chain.platform.network
  registry_retry_seconds: 15
  weights_url: null
  weights_interval_seconds: 360
  weights_timeout_seconds: 15.0
  weights_retries: 3
  weights_freshness_seconds: 720

database:
  url: postgresql+asyncpg://platform:<password>@postgres.platform.svc.cluster.local/platform

docker:
  network_name: platform_challenges
  secret_dir: /var/lib/platform/secrets
  internal_network: true
  broker_url: http://platform-docker-broker:8082
  broker_allowed_images:
    - ghcr.io/platformnetwork/

runtime:
  backend: docker

kubernetes:
  namespace: platform
  in_cluster: true
  kubeconfig: null
  target_state_file: /var/lib/platform/kubernetes_targets.json
  service_account: platform-master
  image_pull_secrets: []
  storage_class: null
  storage_size: 10Gi
  challenge_mode: statefulset
  broker_backend: docker
  gpu_resource_name: nvidia.com/gpu
  node_selector: {}
  tolerations: []
  runtime_class_name: null
  autoscaling:
    enabled: true
    keda_enabled: false
    min_replicas: 1
    max_replicas: 3
    target_cpu_utilization: 70

kubernetes_targets: []

observability:
  log_json: true
  sentry_dsn: null
  otel_service_name: platform-validator
