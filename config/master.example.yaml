network:
  name: platform
  netuid: 0
  chain_endpoint: null
  wallet_name: default
  wallet_hotkey: default
  master_uid: 0

master:
  registry_url: https://rpc.platform.network
  admin_host: 0.0.0.0
  admin_port: 8080
  proxy_host: 0.0.0.0
  proxy_port: 8081
  epoch_interval_seconds: 360
  metagraph_cache_ttl_seconds: 300
  registry_state_file: /var/lib/platform/registry.json

database:
  url: sqlite+aiosqlite:////var/lib/platform-db/platform.sqlite3

docker:
  network_name: platform_challenges
  secret_dir: /var/lib/platform/secrets
  internal_network: true
  broker_host: 0.0.0.0
  broker_port: 8082
  broker_url: http://platform-docker-broker:8082
  broker_workspace_dir: /tmp/platform-docker-broker
  broker_allowed_images:
    - platformnetwork/
    - ghcr.io/platformnetwork/

security:
  admin_token_file: /var/lib/platform/secrets/admin_token

observability:
  log_json: true
  sentry_dsn: null
  otel_service_name: platform-master
