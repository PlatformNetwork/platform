network:
  name: base
  netuid: 100
  chain_endpoint: null
  wallet_name: default
  wallet_hotkey: default
  wallet_path: null
  master_uid: 0
  # Config-driven static metagraph (architecture.md G1). DEFAULT OFF: leave
  # empty/unset for the live-chain path. When set, the bittensor runtime factory
  # seeds the metagraph cache from this set and never constructs a live
  # Subtensor, so the listed validator hotkeys are eligible with NO chain.
  # mock_metagraph:
  #   - hotkey: <validator_ss58>
  #     uid: 1
  #     validator_permit: true
  #     stake: 1000.0

master:
  registry_url: https://chain.joinbase.ai
  proxy_host: 0.0.0.0
  proxy_port: 8081
  epoch_interval_seconds: 360
  metagraph_cache_ttl_seconds: 300
  registry_state_file: /var/lib/base/registry.json

validator:
  registry_url: https://chain.joinbase.ai
  registry_retry_seconds: 15
  weights_url: null
  weights_interval_seconds: 360
  weights_timeout_seconds: 15.0
  weights_retries: 3
  weights_freshness_seconds: 720

database:
  url: postgresql+asyncpg://base:<password>@postgres.base.svc.cluster.local/base

docker:
  network_name: base_challenges
  secret_dir: /var/lib/base/secrets
  internal_network: true
  broker_host: 0.0.0.0
  broker_port: 8082
  broker_url: http://base-docker-broker:8082
  broker_workspace_dir: /tmp/base-docker-broker
  broker_allowed_images:
    - ghcr.io/baseintelligence/
  # Challenge API services run on the manager; broker jobs run on labeled workers.
  challenge_placement_constraint: node.role==manager
  cpu_job_constraint: node.labels.base.workload==cpu
  gpu_job_constraint: node.labels.base.workload==gpu

security:
  admin_token_file: /var/lib/base/secrets/admin_token

observability:
  log_json: true
  sentry_dsn: null
  otel_service_name: base-master
