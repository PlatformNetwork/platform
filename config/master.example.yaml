network:
  name: platform
  netuid: 0
  chain_endpoint: null
  wallet_name: default
  wallet_hotkey: default
  wallet_path: null
  master_uid: 0

master:
  registry_url: https://chain.platform.network
  admin_host: 0.0.0.0
  admin_port: 8080
  proxy_host: 0.0.0.0
  proxy_port: 8081
  epoch_interval_seconds: 360
  metagraph_cache_ttl_seconds: 300
  registry_state_file: /var/lib/platform/registry.json

validator:
  registry_url: https://chain.platform.network
  registry_retry_seconds: 15
  weights_url: null
  weights_interval_seconds: 360
  weights_timeout_seconds: 15.0
  weights_retries: 3
  weights_freshness_seconds: 720

database:
  url: postgresql+asyncpg://platform:platform@postgres.platform.svc.cluster.local/platform

docker:
  network_name: platform_challenges
  secret_dir: /var/lib/platform/secrets
  internal_network: true
  broker_host: 0.0.0.0
  broker_port: 8082
  broker_url: http://platform-docker-broker:8082
  broker_workspace_dir: /tmp/platform-docker-broker
  broker_allowed_images:
    - ghcr.io/platformnetwork/

runtime:
  backend: kubernetes

kubernetes:
  namespace: platform
  in_cluster: true
  kubeconfig: null
  target_state_file: /var/lib/platform/kubernetes_targets.json
  service_account: platform-master
  image_pull_secrets: []
  storage_class: null
  storage_size: 10Gi
  challenge_mode: statefulset
  broker_backend: kubernetes
  gpu_resource_name: nvidia.com/gpu
  node_selector: {}
  tolerations: []
  runtime_class_name: null
  autoscaling:
    enabled: true
    keda_enabled: false
    min_replicas: 1
    max_replicas: 3
    target_cpu_utilization: 70

kubernetes_targets: []

security:
  admin_token_file: /var/lib/platform/secrets/admin_token

observability:
  log_json: true
  sentry_dsn: null
  otel_service_name: platform-master
