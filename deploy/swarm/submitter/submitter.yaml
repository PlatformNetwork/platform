# Submit-only validator config for the Docker-Swarm cutover (Phase 5).
#
# Consumed by deploy/swarm/submitter/run_submitter.py via:
#   --config /etc/base/submitter.yaml
#
# This is the MINIMAL config that load_settings() + the production policy
# validator accept for the submit-only path. It contains NO credentials and is
# safe to keep in the repo.
#
# Intentionally OMITTED blocks (and why it is safe):
#   * database: the submit path never opens the control-plane DB
#     (create_bittensor_submit_runtime + NormalValidatorRunner.submit_latest_weights
#     touch only HTTP + the chain). DatabaseSettings.url defaults to a non-sqlite
#     PostgreSQL URL, which satisfies the production policy check
#     (config/policy.py:validate_database_url) without ever being connected to,
#     so omitting it keeps this file credential-free.
#   * docker: no orchestration runs here. Its defaults are all
#     production-policy-clean (e.g. broker_allowed_images defaults to
#     ghcr.io/baseintelligence/).
#
# Network block replicates the live validator EXACTLY (netuid 100,
# chain_endpoint empty string -> bittensor finney default, wallet
# base-validator/validator under /var/lib/base/wallets, master_uid 0).

environment: development

network:
  name: base
  netuid: 100
  # Empty string (verbatim, as in k3s): falsy -> bittensor connects to the
  # default network (finney mainnet). Do NOT set to a custom endpoint.
  chain_endpoint: ''
  wallet_name: base-validator
  wallet_hotkey: validator
  wallet_path: /var/lib/base/wallets
  master_uid: 0

validator:
  # EXPLICIT: fetch the live vector from chain.joinbase.ai (the Cloudflare-
  # fronted live k3s master that receives miner traffic), NOT the docker admin,
  # so the docker submitter submits the same live vector during the soak.
  # resolved_weights_url returns weights_url when set, so this is authoritative.
  weights_url: https://chain.joinbase.ai
  # netuid 100 on-chain weights_rate_limit = 100 blocks (~1200s @12s/block).
  # Cadence MUST be >= that spacing or commit-reveal submissions are rejected as
  # "too fast". 1260s adds margin above the ~1200s floor.
  weights_interval_seconds: 1260
  weights_timeout_seconds: 15.0
  weights_retries: 3
  # Freshness must be >= the cadence; otherwise a vector is deemed stale before
  # the chain rate limit even allows a re-submission.
  weights_freshness_seconds: 1260

observability:
  log_json: true
  otel_service_name: base-submitter
