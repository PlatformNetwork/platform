policy:
  enforceProduction: true

environment: production

image:
  repository: ghcr.io/platformnetwork/platform
  tag: 3.0.3
  digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
  production: true
  pullPolicy: IfNotPresent
  pullSecrets: []

images:
  master:
    repository: ghcr.io/platformnetwork/platform-master
    tag: 3.0.3
    digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
    pullPolicy: IfNotPresent
  validator:
    repository: ghcr.io/platformnetwork/platform
    tag: 3.0.3
    digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
    pullPolicy: IfNotPresent
  updater:
    repository: ghcr.io/platformnetwork/platform
    tag: 3.0.3
    digest: sha256:1111111111111111111111111111111111111111111111111111111111111111
    pullPolicy: IfNotPresent

imageAutoUpdate:
  enabled: false
  schedule: "*/1 * * * *"
  registryEndpoint: ""

database:
  urlSecret:
    name: platform-production-postgres
    key: url

security:
  existingSecret: platform-production-secrets
  adminTokenKey: admin_token

persistence:
  enabled: true
  existingClaim: ""
  storageClass: platform-retain
  size: 50Gi

kubernetes:
  namespace: platform
  serviceAccount: platform-master
  challengeMode: deployment
  storageClass: platform-retain
  storageSize: 50Gi
  targetDefaults:
    imagePullSecrets: []

masterAdmin:
  replicas: 2

masterProxy:
  replicas: 2
  uploadRequireRegisteredHotkey: true
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

broker:
  enabled: true
  replicas: 2
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

docker:
  brokerAllowedImages:
    - ghcr.io/platformnetwork/

validator:
  enabled: false
  replicas: 1

weights:
  enabled: true

networkPolicy:
  enabled: true
  ingress:
    allowRuntimePods: true
    extraFrom: []
  egress:
    allowAll: false
    extraRules:
      - to:
          - namespaceSelector: {}
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53
      - to:
          - ipBlock:
              cidr: 203.0.113.0/24
        ports:
          - protocol: TCP
            port: 5432
      - to:
          - ipBlock:
              cidr: 198.51.100.0/24
        ports:
          - protocol: TCP
            port: 443
