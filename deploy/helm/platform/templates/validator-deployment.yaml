{{- if .Values.validator.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "platform.validatorDeploymentName" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    platform.component: "validator"
spec:
  replicas: {{ .Values.validator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "platform.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      platform.component: "validator"
  template:
    metadata:
      labels:
        {{- include "platform.labels" . | nindent 8 }}
        platform.component: "validator"
    spec:
      serviceAccountName: {{ include "platform.serviceAccountName" . }}
      automountServiceAccountToken: true
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- range . }}
        - name: {{ . }}
        {{- end }}
      {{- end }}
      securityContext:
        {{- include "platform.podSecurityContext" . | nindent 8 }}
      containers:
        - name: validator
          image: {{ include "platform.imageValue" (dict "image" .Values.images.validator) | quote }}
          imagePullPolicy: {{ default .Values.image.pullPolicy .Values.images.validator.pullPolicy }}
          command:
            - platform
            - validator
            - run
            - --config
            - config/master.kubernetes.yaml
          env:
            - name: HOME
              value: /var/lib/platform
            - name: PLATFORM_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.urlSecret.name | quote }}
                  key: {{ .Values.database.urlSecret.key | quote }}
          securityContext:
            {{- include "platform.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /app/config/master.kubernetes.yaml
              subPath: master.yaml
              readOnly: true
            - name: data
              mountPath: /var/lib/platform
            - name: wallet
              mountPath: {{ .Values.network.walletPath }}/{{ .Values.network.walletName }}/hotkeys
              readOnly: true
          resources:
            {{- toYaml .Values.validator.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "platform.fullname" . }}-config
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "platform.fullname" .)) | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: wallet
          secret:
            secretName: {{ .Values.validator.walletSecretName | default (printf "%s-wallet" (include "platform.fullname" .)) | quote }}
            items:
              - key: hotkey
                path: {{ .Values.network.walletHotkey | quote }}
              - key: hotkeypub.txt
                path: {{ printf "%spub.txt" .Values.network.walletHotkey | quote }}
{{- end }}
