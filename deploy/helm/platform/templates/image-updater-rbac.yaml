{{- if .Values.imageAutoUpdate.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "platform.fullname" . }}-image-updater
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    platform.component: "image-updater"
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "platform.fullname" . }}-image-updater
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    platform.component: "image-updater"
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames:
      - {{ include "platform.fullname" . }}-admin
      - {{ include "platform.fullname" . }}-proxy
      {{- if .Values.broker.enabled }}
      - {{ include "platform.fullname" . }}-broker
      {{- end }}
      {{- if .Values.validator.enabled }}
      - {{ include "platform.fullname" . }}-validator
      {{- end }}
    verbs: ["get", "patch"]
  {{- if .Values.weights.enabled }}
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    resourceNames:
      - {{ include "platform.fullname" . }}-weights
    verbs: ["get", "patch"]
  {{- end }}
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "platform.fullname" . }}-image-updater
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    platform.component: "image-updater"
subjects:
  - kind: ServiceAccount
    name: {{ include "platform.fullname" . }}-image-updater
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "platform.fullname" . }}-image-updater
{{- end }}
