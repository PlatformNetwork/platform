<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="430" viewBox="0 0 1120 430" role="img" aria-labelledby="title desc">
<title>Platform challenge dashboard</title>
<desc>Registered challenges with status, miners and emissions</desc>
<defs>
<linearGradient id="page" x1="0" x2="1" y1="0" y2="1">
<stop offset="0%" stop-color="#020617"/>
<stop offset="48%" stop-color="#0f172a"/>
<stop offset="100%" stop-color="#164e63"/>
</linearGradient>
<radialGradient id="glow" cx="50%" cy="0%" r="70%">
<stop offset="0%" stop-color="#38bdf8" stop-opacity="0.42"/>
<stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
</radialGradient>
<linearGradient id="heroCard" x1="0" x2="1" y1="0" y2="1">
<stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
<stop offset="100%" stop-color="#ecfeff" stop-opacity="0.92"/>
</linearGradient>
<filter id="cardShadow" x="-5%" y="-15%" width="110%" height="140%">
<feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#000000" flood-opacity="0.24"/>
</filter>
<filter id="rowShadow" x="-4%" y="-40%" width="108%" height="190%">
<feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.12"/>
</filter>
</defs>
<style>
text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
.title{font-size:30px;font-weight:850;fill:#0f172a}
.summary{font-size:14px;fill:#475569}
.kpiLabel{font-size:11px;font-weight:800;fill:#64748b;letter-spacing:.08em}
.kpiValue{font-size:22px;font-weight:850;fill:#0f172a}
.head{font-size:11px;font-weight:850;fill:#cbd5e1;letter-spacing:.10em}
.cell{font-size:14px;fill:#1e293b}
.small{font-size:12px;fill:#64748b}
.strong{font-weight:750}
.muted{fill:#64748b}
.pill{font-size:12px;font-weight:850}
.number{font-weight:700}
.emptyIcon{font-size:20px;font-weight:850;fill:#0284c7}
.emptyTitle{font-size:18px;font-weight:850;fill:#0f172a}
.emptyText{font-size:13px;fill:#64748b}
</style>
<rect width="100%" height="100%" rx="38" fill="url(#page)"/>
<rect width="100%" height="100%" rx="38" fill="url(#glow)"/>
<rect x="24" y="24" width="1072" height="382" rx="34" fill="#f8fafc" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.16"/>
<circle cx="900" cy="72" r="92" fill="#22d3ee" opacity="0.16"/>
<circle cx="84" cy="332" r="120" fill="#818cf8" opacity="0.12"/>
<rect x="34" y="34" width="1052" height="96" rx="30" fill="url(#heroCard)" filter="url(#cardShadow)"/>
<text id="title" x="64" y="76" class="title">Platform challenges</text>
<text id="desc" x="64" y="100" class="summary">3 challenges · 0 active · 0% emissions · refreshable</text>
<rect x="612" y="54" width="86" height="56" rx="18" fill="#eff6ff"/>
<text x="632" y="76" class="kpiValue">3</text>
<text x="632" y="96" class="kpiLabel">TOTAL</text>
<rect x="714" y="54" width="86" height="56" rx="18" fill="#dcfce7"/>
<text x="734" y="76" class="kpiValue">0</text>
<text x="734" y="96" class="kpiLabel">ACTIVE</text>
<rect x="816" y="54" width="112" height="56" rx="18" fill="#ecfeff"/>
<text x="836" y="76" class="kpiValue">0%</text>
<text x="836" y="96" class="kpiLabel">EMISSIONS</text>
<rect x="34" y="150" width="1052" height="38" rx="19" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-opacity="0.12"/>
<text x="84" y="174" class="head">Challenge</text>
<text x="580" y="174" class="head">Status</text>
<text x="706" y="174" class="head">Online</text>
<text x="830" y="174" class="head">Miners</text>
<text x="950" y="174" class="head">Emissions</text>
<rect x="34" y="181" width="1052" height="58" rx="24" fill="#ffffff" fill-opacity="0.94" filter="url(#rowShadow)"/>
<circle cx="62" cy="210" r="12" fill="#f1f5f9"/>
<circle cx="62" cy="210" r="5" fill="#94a3b8"/>
<text x="84" y="204" class="cell strong">Agent Challenge</text>
<text x="84" y="224" class="small muted">agent-challenge · Benchmark autonomous agents on practical execution tasks.</text>
<rect x="562" y="198" width="96" height="24" rx="12" fill="#f1f5f9"/>
<text x="580" y="215" class="pill" fill="#94a3b8">draft</text>
<rect x="688" y="198" width="86" height="24" rx="12" fill="#f1f5f9"/>
<text x="706" y="215" class="pill" fill="#64748b">offline</text>
<text x="830" y="215" class="cell number">N/A</text>
<text x="950" y="215" class="cell number">0%</text>
<rect x="34" y="249" width="1052" height="58" rx="24" fill="#ffffff" fill-opacity="0.94" filter="url(#rowShadow)"/>
<circle cx="62" cy="278" r="12" fill="#f1f5f9"/>
<circle cx="62" cy="278" r="5" fill="#94a3b8"/>
<text x="84" y="272" class="cell strong">Data Fabrication</text>
<text x="84" y="292" class="small muted">data-fabrication · Score synthetic data pipelines for usefulness and integrity.</text>
<rect x="562" y="266" width="96" height="24" rx="12" fill="#f1f5f9"/>
<text x="580" y="283" class="pill" fill="#94a3b8">draft</text>
<rect x="688" y="266" width="86" height="24" rx="12" fill="#f1f5f9"/>
<text x="706" y="283" class="pill" fill="#64748b">offline</text>
<text x="830" y="283" class="cell number">N/A</text>
<text x="950" y="283" class="cell number">0%</text>
<rect x="34" y="317" width="1052" height="58" rx="24" fill="#ffffff" fill-opacity="0.94" filter="url(#rowShadow)"/>
<circle cx="62" cy="346" r="12" fill="#f1f5f9"/>
<circle cx="62" cy="346" r="5" fill="#94a3b8"/>
<text x="84" y="340" class="cell strong">Prism</text>
<text x="84" y="360" class="small muted">prism · Evaluate reasoning quality across multi-step prompts.</text>
<rect x="562" y="334" width="96" height="24" rx="12" fill="#f1f5f9"/>
<text x="580" y="351" class="pill" fill="#94a3b8">draft</text>
<rect x="688" y="334" width="86" height="24" rx="12" fill="#f1f5f9"/>
<text x="706" y="351" class="pill" fill="#64748b">offline</text>
<text x="830" y="351" class="cell number">N/A</text>
<text x="950" y="351" class="cell number">0%</text>
</svg>
